name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install uv
      uses: astral-sh/setup-uv@v5
      with:
        # Built-in caching keyed on uv.lock; no separate actions/cache step needed.
        enable-cache: true
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: uv sync --locked

    - name: Install Qt system libraries
      # PySide6 needs these shared libs to even import its GUI modules (e.g. libEGL.so.1).
      # The non-Qt GUI/dashboard tests transitively import the GUI stack, and tests run
      # headless via QT_QPA_PLATFORM=offscreen (set in test/conftest.py).
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

    - name: Lint (ruff)
      run: |
        uv run ruff check .
        uv run ruff format --check .

    - name: Type check (mypy)
      run: uv run mypy

    - name: Run tests
      # Qt GUI tests are excluded via the `qt` marker (no lockfile mutation needed — pytest-qt
      # stays installed). The offscreen platform + Qt system libs keep collection healthy.
      run: >-
        uv run pytest -m "not qt"
        --cov=ripper --cov-report=xml --cov-fail-under=40

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml
        retention-days: 5
