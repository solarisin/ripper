name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install Poetry
      uses: snok/install-poetry@v1
      with:
        version: 2.4.1
        virtualenvs-create: true
        virtualenvs-in-project: true

    - name: Cache Poetry dependencies
      uses: actions/cache@v4
      with:
        path: ./.venv
        key: ${{ runner.os }}-${{ matrix.python-version }}-poetry-${{ hashFiles('poetry.lock') }}
        restore-keys: |
          ${{ runner.os }}-${{ matrix.python-version }}-poetry-
          ${{ runner.os }}-poetry-

    - name: Install dependencies
      run: poetry install --with dev

    - name: Install Qt system libraries
      # PySide6 needs these shared libs to even import its GUI modules (e.g. libEGL.so.1).
      # The non-Qt GUI/dashboard tests transitively import the GUI stack, and tests run
      # headless via QT_QPA_PLATFORM=offscreen (set in test/conftest.py).
      run: |
        sudo apt-get update
        sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

    - name: Lint (ruff)
      run: |
        poetry run ruff check .
        poetry run ruff format --check .

    - name: Type check (mypy)
      run: poetry run mypy

    - name: Run tests
      # Qt GUI tests are excluded via the `qt` marker. poetry.lock stays intact (pytest-qt
      # is not removed); the offscreen platform + Qt system libs keep collection healthy.
      run: >-
        poetry run pytest -m "not qt"
        --cov=ripper --cov-report=xml --cov-fail-under=40

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      with:
        name: coverage-report-${{ matrix.python-version }}
        path: coverage.xml
        retention-days: 5
